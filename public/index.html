<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Control</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1><a href="/">Mission Control</a></h1>
    <div id="counts"></div>
  </header>

  <nav id="list-tabs" aria-label="Todo lists">
    <button class="list-tab active" data-list="work" type="button">
      Work <span class="tab-count" id="work-tab-count">0</span>
    </button>
    <button class="list-tab" data-list="personal" type="button">
      Personal <span class="tab-count" id="personal-tab-count">0</span>
    </button>
  </nav>

  <nav id="sub-tabs">
    <button class="sub-tab active" data-subtab="todo" type="button">TODO</button>
    <button class="sub-tab" data-subtab="prs" type="button">
      PRs <span class="tab-count" id="prs-sub-count">…</span>
    </button>
    <button class="sub-tab" data-subtab="code" type="button">
      Code <span class="tab-count" id="code-sub-count">0</span>
    </button>
    <button class="sub-tab" data-subtab="map" type="button">Map</button>
    <button class="sub-tab" data-subtab="scripts" type="button">Scripts</button>
  </nav>

  <div id="toolbar">
    <div class="filters">
      <input type="text" id="search" placeholder="Search…" autocomplete="off">

      <select id="filter-project">
        <option value="all">All projects</option>
      </select>

      <div class="priority-toggles">
        <label class="toggle-btn active" data-priority="now">Now</label>
        <label class="toggle-btn active" data-priority="next">Next</label>
        <label class="toggle-btn" data-priority="someday">Someday</label>
        <label class="toggle-btn" data-priority="done">Done</label>
      </div>
    </div>

    <div class="sort-controls">
      <span>Sort:</span>
      <button class="sort-btn active" data-field="priority">Priority</button>
      <button class="sort-btn" data-field="dueDate">Due date</button>
      <button class="sort-btn" data-field="project">Project</button>
    </div>
  </div>

  <div id="new-todo-panel" class="hidden">
    <form id="new-todo-form">
      <input type="text" id="new-text" placeholder="Todo text… (URLs auto-linked on save)" autocomplete="off" required>
      <select id="new-project"></select>
      <select id="new-priority">
        <option value="now">Now</option>
        <option value="next" selected>Next</option>
        <option value="someday">Someday</option>
      </select>
      <button type="submit">Add</button>
      <button type="button" id="cancel-new">Cancel</button>
    </form>
  </div>

  <div id="pr-view" class="hidden">
    <div id="pr-view-header">
      <button id="pr-refresh-btn" title="Refresh">↻ Refresh</button>
    </div>
    <div id="pr-list"></div>
  </div>

  <div id="code-view" class="hidden">
    <div id="code-toolbar">
      <select id="code-filter-repo">
        <option value="all">All repos</option>
      </select>
      <button id="code-refresh-btn">↻ Refresh</button>
    </div>
    <div id="code-list"></div>
  </div>

  <div id="map-view" class="hidden">
    <div id="map-view-header">
      <span id="map-path" class="view-source-path"></span>
      <button id="map-refresh-btn" title="Refresh">↻ Refresh</button>
    </div>
    <div id="map-body" class="md-doc"></div>
  </div>

  <div id="scripts-view" class="hidden">
    <div id="scripts-view-header">
      <span class="view-source-path">~/.claude/scripts/</span>
      <button id="scripts-refresh-btn" title="Refresh">↻ Refresh</button>
    </div>
    <div id="scripts-list"></div>
  </div>

  <main>
    <table id="todo-table">
      <thead>
        <tr>
          <th class="col-project">Project</th>
          <th class="col-priority">Priority</th>
          <th class="col-due">Due</th>
          <th class="col-todo">Todo</th>
          <th class="col-actions"></th>
        </tr>
      </thead>
      <tbody id="todo-body"></tbody>
    </table>
    <div id="empty-state" class="hidden">No items match the current filters.</div>
  </main>

  <button id="add-btn" title="New todo">+</button>

  <div id="toast"></div>

  <dialog id="confirm-delete-dialog">
    <p>Delete this todo?</p>
    <div class="dialog-actions">
      <button id="confirm-delete-ok" class="btn-dialog-danger">Delete</button>
      <button id="confirm-delete-cancel" class="btn-dialog-cancel">Cancel</button>
    </div>
  </dialog>

  <div id="context-overlay" class="hidden"></div>
  <aside id="context-panel" class="hidden">
    <div id="context-panel-header">
      <span id="context-panel-title"></span>
      <button id="context-panel-close" title="Close">✕</button>
    </div>
    <div id="context-panel-body"></div>
  </aside>

  <script src="app.js"></script>
</body>
</html>
